# email.yaml — 邮件服务场景

services:
  - name: "Resend"
    category: "email"
    tags: ["transactional", "developer-friendly", "free-tier"]
    pricing_tier: "freemium"
    free_tier: "100 emails/day"
    ai_friendliness: 5
    dx_score: 5
    official_docs: "https://resend.com/docs"
    mcp_available: true
    mcp_url: "https://github.com/resend/mcp-send-email"
    quick_install: "npm install resend"
    best_for: ["SaaS MVP", "Next.js apps", "developer-focused products"]
    not_for: ["high-volume bulk campaigns"]
    last_verified: "2026-02"

  - name: "SendGrid"
    category: "email"
    tags: ["transactional", "marketing", "enterprise-ready"]
    pricing_tier: "freemium"
    free_tier: "Free tier available"
    ai_friendliness: 4
    dx_score: 4
    official_docs: "https://docs.sendgrid.com"
    mcp_available: false
    mcp_url: null
    quick_install: "npm install @sendgrid/mail"
    best_for: ["mixed transactional and marketing", "Twilio ecosystem"]
    not_for: ["minimal setup complexity"]
    last_verified: "2026-02"

  - name: "Postmark"
    category: "email"
    tags: ["transactional", "deliverability"]
    pricing_tier: "paid"
    free_tier: "No free tier; trial available"
    ai_friendliness: 4
    dx_score: 5
    official_docs: "https://postmarkapp.com/developer"
    mcp_available: false
    mcp_url: null
    quick_install: "npm install postmark"
    best_for: ["deliverability-sensitive transactional flows"]
    not_for: ["budget-constrained hobby projects"]
    last_verified: "2026-02"

  - name: "Mailgun"
    category: "email"
    tags: ["transactional", "api", "inbound"]
    pricing_tier: "paid"
    free_tier: "Trial available"
    ai_friendliness: 4
    dx_score: 4
    official_docs: "https://documentation.mailgun.com/"
    mcp_available: false
    mcp_url: null
    quick_install: "npm install mailgun.js"
    best_for: ["email APIs with inbound routing"]
    not_for: ["teams expecting always-free tier"]
    last_verified: "2026-02"

  - name: "Amazon SES"
    category: "email"
    tags: ["aws", "transactional", "cost-efficient"]
    pricing_tier: "paid"
    free_tier: "Free usage available with AWS free tier constraints"
    ai_friendliness: 3
    dx_score: 3
    official_docs: "https://docs.aws.amazon.com/ses/"
    mcp_available: false
    mcp_url: null
    quick_install: "npm install @aws-sdk/client-ses"
    best_for: ["AWS-native workloads", "large-scale sending"]
    not_for: ["teams wanting fastest onboarding"]
    last_verified: "2026-02"
