  - name: "OpenSearch"
    category: "search"
    tags: ["open-source", "distributed", "elasticsearch-compatible"]
    pricing_tier: "freemium"
    free_tier: "Open-source self-hosting available"
    ai_friendliness: 3
    dx_score: 3
    official_docs: "https://docs.opensearch.org/latest/"
    mcp_available: false
    mcp_url: null
    quick_install: "npm install @opensearch-project/opensearch"
