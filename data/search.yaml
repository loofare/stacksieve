# search.yaml — 搜索服务场景

services:
  - name: "Algolia"
    category: "search"
    tags: ["hosted-search", "instant-search", "relevance"]
    pricing_tier: "freemium"
    free_tier: "Free builder tier available"
    ai_friendliness: 4
    dx_score: 5
    official_docs: "https://www.algolia.com/doc/"
    mcp_available: false
    mcp_url: null
    quick_install: "npm install algoliasearch"
    best_for: ["customer-facing instant search", "high relevance tuning"]
    not_for: ["self-host-only architecture"]
    last_verified: "2026-02"

  - name: "Typesense"
    category: "search"
    tags: ["open-source", "self-hosted", "fast"]
    pricing_tier: "freemium"
    free_tier: "Open-source self-hosting option"
    ai_friendliness: 4
    dx_score: 4
    official_docs: "https://github.com/typesense/typesense"
    mcp_available: false
    mcp_url: null
    quick_install: "npm install typesense"
    best_for: ["self-hosted search", "cost-controlled deployments"]
    not_for: ["teams avoiding operational overhead"]
    last_verified: "2026-02"

  - name: "Meilisearch"
    category: "search"
    tags: ["open-source", "self-hosted", "developer-friendly"]
    pricing_tier: "free"
    free_tier: "Open-source"
    ai_friendliness: 4
    dx_score: 4
    official_docs: "https://www.meilisearch.com/docs"
    mcp_available: false
    mcp_url: null
    quick_install: "npm install meilisearch"
